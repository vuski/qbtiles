site_name: QBTiles
site_url: https://vuski.github.io/qbtiles/
repo_url: https://github.com/vuski/qbtiles
repo_name: vuski/qbtiles

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      allow_errors: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html

nav:
  - Overview: index.md
  - Specification:
    - Architecture: architecture.md
    - Quadkey Encoding: quadkey-encoding.md
    - Format Spec: format-spec.md
    - Comparison: comparison.md
    - Benchmark: benchmark-results.md
  - Beyond Tile Indexing: future-directions.md
  - Examples:
    - XYZ Tiles: examples/01_xyz_tiles.ipynb
    - Bitmask as Data Container: examples/02_bitmask_as_data_container.ipynb
    - Web Client: examples/03_web_client.md
    - Compare PMTiles: examples/05_compare_real_pmtiles.md
  - 한국어:
    - 홈: ko/index.md
    - 아키텍처: ko/architecture.md
    - 쿼드키 인코딩: ko/quadkey-encoding.md
    - 포맷 스펙: ko/format-spec.md
    - 비교: ko/comparison.md
    - 벤치마크: ko/benchmark-results.md
